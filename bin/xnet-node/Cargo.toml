[workspace]
resolver = "2"

members = [
    "node",
    "runtime",
    "pallets/block-rewards",
]

[workspace.dependencies]
# RPC va Serialization
jsonrpsee = { version = "0.23.2", features = ["server", "macros"] }
serde = { version = "1.0.197", features = ["derive"], default-features = false }
serde_json = "1.0.114"

# Polkadot SDK (stable2407) - Faqat yangi nomlar bilan
sc-rpc-api = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sc-consensus-grandpa = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sc-consensus-babe = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
pallet-transaction-payment-rpc = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
pallet-im-online = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
substrate-frame-rpc-system = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sp-transaction-storage-proof = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sp-api = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }

# Primitives
sp-consensus-babe = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sp-core = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }
sp-runtime = { git = "https://github.com/paritytech/polkadot-sdk.git", branch = "stable2407" }

[profile.release]
panic = "unwind"
opt-level = 3
lto = "fat"
codegen-units = 1
overflow-checks = false
debug = false
strip = "symbols"
