[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
cache = true
cache_path = "cache"
force = false
evm_version = "shanghai"

[profile.ci]
verbosity = "very_verbose"

[fuzz]
# Fuzz runs per test
runs = 10000
# Show coverage per test
coverage = true
# Fail on first fuzz failure
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
use_tabs = false
