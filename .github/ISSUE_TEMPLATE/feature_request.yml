name: Feature Request
description: Propose an architecture, EVM precompile, Wasm module, or other core advancement for XNet.
title: "[Feature] <Short title>"
labels: ["enhancement", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping to improve XNet!
        **Testnet Context:** Since the network is currently an active Testnet building out EVM/Wasm compatibility, ZKP protocols, and cross-chain messaging (XCM), please frame your feature request in the context of our current development phase.

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
      placeholder: |
        Currently, deploying an Ink! contract fails when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here. Does this relate to EVM compatibility, ZKP, or Substrate Pallets?
    validations:
      required: false
