name: "🚀 Feature Request / Proposal"
description: "Suggest a core improvement or a new functionality for XNET Protocol"
labels: ["enhancement", "XIP-proposal"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Feature Proposal Guidelines
        Before submitting, ensure this aligns with the **XNET Roadmap**.
        We prioritize scalability, security, and economic efficiency.

  - type: checkboxes
    id: check
    attributes:
      label: "Proposal Readiness"
      options:
        - label: "I have confirmed this feature is not already implemented or planned."
          required: true

  - type: textarea
    id: motivation
    attributes:
      label: "Business Logic & Motivation"
      description: "Why does XNET need this? What is the economic or technical advantage?"
      placeholder: "Explain the value proposition for the network..."
    validations:
      required: true

  - type: textarea
    id: request
    attributes:
      label: "Technical Specification"
      description: "Describe the functionality in depth."
      placeholder: "Architecture changes, new pallet requirements, or API updates..."
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "Ecosystem Impact"
      description: "How does this change affect existing validators and users?"
      placeholder: "Gas fees impact, block time changes, or breaking changes..."

  - type: dropdown
    id: help
    attributes:
      label: "Collaboration"
      description: "Are you willing to contribute to the development of this feature?"
      options:
        - "Yes, I can provide the code (PR)."
        - "I can assist with the technical design."
        - "No, I am just proposing the idea."
    validations:
      required: true