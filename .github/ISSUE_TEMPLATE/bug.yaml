name: "Bug Report"
description: "Submit a technical bug report for the XNET Protocol"
labels: ["bug", "triage-needed"]
body:
  - type: markdown
    attributes:
      value: |
        ### XNET Protocol Bug Report
        Documentation: [Website](https://xnetcoin.org) | Support: [Telegram](https://t.me/xnethq) | Updates: [X](https://x.com/xnethq)
        ---
        Please provide detailed technical constraints and environmental factors to facilitate reproduction.

  - type: checkboxes
    attributes:
      label: "Pre-Submission Checklist"
      options:
        - label: "I have searched the issue tracker for similar bug reports."
          required: true
        - label: "I am reporting a reproducible protocol or implementation bug."
          required: true

  - type: dropdown
    id: component
    attributes:
      label: "Protocol Component"
      description: "Select the subsystem where the error originated."
      options:
        - "Consensus Mechanism"
        - "Runtime / State Transition"
        - "Networking / P2P"
        - "Storage Engine"
        - "RPC API"
        - "Cryptography / Signing"
        - "Other / Unknown"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: "Description"
      description: "A clear and concise description of the bug."
      placeholder: "Example: The node crashes with a segmentation fault during state sync at block..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Steps to Reproduce"
      description: "Please provide deterministic steps to replicate the behavior."
      placeholder: |
        1. Run node with command '...'
        2. Send RPC request '...'
        3. Observe failure mode '...'
    validations:
      required: true

  - type: textarea
    id: traces
    attributes:
      label: "Expected vs. Actual Behavior"
      description: "Describe what should have happened vs what actually happened."
      placeholder: "Expected: Transaction gets included in the next block. Actual: Transaction is dropped from the mempool."

  - type: textarea
    id: environment
    attributes:
      label: "Environment Information"
      description: "Hardware specifications, Operating System, and software versions."
      placeholder: "OS: Ubuntu 22.04 LTS\nArchitecture: x86_64\nRust version: rustc 1.77.x\nXNET revision: ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs and Backtraces"
      description: "Include relevant RUST_LOG output or panic backtraces. Use code blocks."
      render: shell