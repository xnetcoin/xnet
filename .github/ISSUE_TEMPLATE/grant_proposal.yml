name: EVM / Wasm / Ecosystem Grant Proposal
description: Submit a new grant proposal for the XNet ecosystem (DeFi, NFT, Tooling, etc.)
title: "[Grant] <Project Name> - <Short Description>"
labels: ["grant-proposal", "stage: 1-submitted"]
body:
  - type: markdown
    attributes:
      value: |
        # Welcome to the XNet Grant Program!
        Thank you for your interest in building on XNet. We are actively funding projects that bring value to our Testnet and future Mainnet ecosystem.
        
        **Note:** Our network is currently in the active Testnet phase (incorporating Wasm/ink!, EVM, and ZKP/XCM). Your proposal should reflect an understanding of this environment.

  - type: input
    id: project_name
    attributes:
      label: Project Name
      description: The official name of your project.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Project Category
      description: What category best describes your project?
      options:
        - DeFi / DEX
        - NFT / Gaming
        - Wallet / Infrastructure
        - Tooling / Analytics
        - ZKP / Privacy
        - Cross-Chain (XCM)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Project Description
      description: Provide a comprehensive overview of your project. What problem does it solve, and how does it benefit the XNet ecosystem?
      placeholder: |
        Our project aims to...
        It benefits XNet by...
    validations:
      required: true

  - type: textarea
    id: team
    attributes:
      label: Team Background
      description: Who is building this? Provide Github links, past projects, or relevant experience.
    validations:
      required: true

  - type: textarea
    id: milestones
    attributes:
      label: Milestones & Funding Request
      description: Break down your project into specific, measurable milestones and the requested funding for each stage. (Stage 1: Proposal -> Stage 2: Initial -> Stage 3: Delivery).
      placeholder: |
        - Milestone 1: Smart contract development on EVM testnet (Requested: $X)
        - Milestone 2: Wasm/ink! integration ...
    validations:
      required: true

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: I understand that XNet is in the Testnet phase and APIs/runtimes may change.
          required: true
        - label: I have read the `CONTRIBUTING.md` guidelines regarding Grants.
          required: true
