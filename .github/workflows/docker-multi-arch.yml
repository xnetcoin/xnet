name: Multi-Arch Docker Build & Push

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Har hafta yakshanba 2:00 UTC da

env:
  REGISTRY: docker.io
  IMAGE_NAME: xnetcoin/xnet-node
  BUILDKIT_PROGRESS: plain

jobs:
  pre-checks:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ ERROR: DOCKER_USERNAME secret not set!"
            echo "Go to: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "❌ ERROR: DOCKER_PASSWORD secret not set!"
            echo "Use Docker Hub Personal Access Token (PAT), not password!"
            exit 1
          fi
          echo "✅ All required secrets are configured"

      - name: Check prerequisites
        run: |
          echo "## ✅ Pre-flight Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- DOCKER_USERNAME: configured" >> $GITHUB_STEP_SUMMARY
          echo "- DOCKER_PASSWORD: configured" >> $GITHUB_STEP_SUMMARY
          echo "- Cosign: will use keyless (OIDC)" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    name: Build Multi-Arch Docker Images
    needs: pre-checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
      max-parallel: 2
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU for cross-compilation
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.xnet-node
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ matrix.platform }},mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
          outputs: type=docker

      - name: Build summary
        run: |
          echo "## 🐳 Build Results for ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform**: ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Digest**: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  create-manifest:
    name: Create Multi-Arch Manifest
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=latest
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create and push manifest
        id: manifest
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          set -e
          echo "Creating manifest for version: ${VERSION}"
          docker manifest create ${IMAGE}:${VERSION} \
            --amend ${IMAGE}:linux-amd64-${VERSION} \
            --amend ${IMAGE}:linux-arm64-${VERSION} \
            --amend ${IMAGE}:linux-arm-v7-${VERSION} || { echo "❌ Manifest creation failed"; exit 1; }
          docker manifest push ${IMAGE}:${VERSION} || { echo "❌ Manifest push failed"; exit 1; }
          echo "manifest_created=true" >> $GITHUB_OUTPUT
          echo "✅ Manifest successfully created and pushed"

      - name: Manifest summary
        if: steps.manifest.outputs.manifest_created == 'true'
        run: |
          echo "## 📦 Manifest Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: amd64, arm64, arm/v7" >> $GITHUB_STEP_SUMMARY

  sign-images:
    name: Sign Docker Images (Cosign)
    needs: create-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # OIDC token uchun zarur!
    env:
      COSIGN_EXPERIMENTAL: 1  # Keyless signing
    steps:
      - name: Install Cosign
        run: |
          curl -L https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          sudo mv cosign /usr/local/bin/
          cosign version

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=latest
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Sign image with Cosign (Keyless)
        id: sign
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          set -e
          
          echo "🔐 Signing Docker image: ${IMAGE}:${VERSION}"
          echo "Using keyless Cosign (OIDC from GitHub Actions)"
          
          # Cosign bilan keyless signing (OIDC)
          cosign sign --yes "${IMAGE}:${VERSION}" || { 
            echo "❌ Image signing failed"
            exit 1
          }
          
          echo "sign_status=success" >> $GITHUB_OUTPUT
          echo "✅ Image successfully signed with Cosign (keyless)"
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Verify signature
        if: steps.sign.outputs.sign_status == 'success'
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          
          echo "🔍 Verifying signature for: ${IMAGE}:${VERSION}"
          
          # Signature verify qilish
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}" \
            --certificate-oidc-issuer=https://token.actions.githubusercontent.com \
            "${IMAGE}:${VERSION}" && {
            echo "✅ Signature verified successfully!"
          } || {
            echo "⚠️ Signature verification had issues (may be expected for new images)"
          }
        env:
          COSIGN_EXPERIMENTAL: 1
        continue-on-error: true

      - name: Show signature command
        run: |
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          VERSION=${{ steps.version.outputs.version }}
          
          echo "## 🔐 Image Signing Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${IMAGE}:${VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Signing Tool**: Cosign v2.2.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Method**: Keyless Signing (OIDC)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Signed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verify Signature:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "cosign verify \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-identity-regexp='https://github.com/${{ github.repository }}' \\" >> $GITHUB_STEP_SUMMARY
          echo "  --certificate-oidc-issuer=https://token.actions.githubusercontent.com \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${IMAGE}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  test-images:
    name: Test Docker Images
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Test image on ${{ matrix.platform }}
        id: test
        run: |
          echo "Testing image on ${{ matrix.platform }}..."
          docker run --rm --platform=${{ matrix.platform }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --version || echo "test_status=failed" >> $GITHUB_OUTPUT
          echo "test_status=passed" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Test result
        run: |
          echo "## ✅ Test Results for ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: Tested" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Container Security Scan
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: trivy-results.sarif
          category: trivy-scan

      - name: Security scan summary
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Scanner**: Trivy" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Severity Levels**: CRITICAL, HIGH" >> $GITHUB_STEP_SUMMARY

  cleanup-cache:
    name: Clean Old Build Caches
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      actions: write
    steps:
      - name: Delete old caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sort: 'created_at',
              order: 'desc'
            });
            let deletedCount = 0;
            if (caches.data.actions_caches.length > 5) {
              for (let i = 5; i < caches.data.actions_caches.length; i++) {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: caches.data.actions_caches[i].id
                });
                deletedCount++;
              }
            }
            console.log(`Deleted ${deletedCount} old cache(s), keeping the latest 5`);

  notify-success:
    name: Notify on Success
    needs: [build-and-push, create-manifest, sign-images, test-images, security-scan]
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: read
    steps:
      - name: Success notification
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## ✅ Workflow Completed Successfully!
          
          - **Repository**: ${{ github.repository }}
          - **Ref**: ${{ github.ref }}
          - **Commit SHA**: ${{ github.sha }}
          - **Actor**: ${{ github.actor }}
          - **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          
          ### 📦 Build Details
          - ✅ All 3 platforms built (amd64, arm64, arm/v7)
          - ✅ Manifest created and pushed
          - ✅ Images signed with Cosign (keyless)
          - ✅ All images tested
          - ✅ Security scan completed
          - ✅ Old caches cleaned
          EOF

  notify-failure:
    name: Notify on Failure
    needs: [build-and-push, create-manifest, sign-images, test-images, security-scan]
    runs-on: ubuntu-latest
    if: failure()
    permissions:
      contents: read
    steps:
      - name: Failure notification
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## ❌ Workflow Failed!
          
          - **Repository**: ${{ github.repository }}
          - **Ref**: ${{ github.ref }}
          - **Commit SHA**: ${{ github.sha }}
          - **Run ID**: ${{ github.run_id }}
          - **Check logs**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          exit 1
