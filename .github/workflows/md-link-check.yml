name: "XNET: Link Integrity Audit"

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  markdown-link-check:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Run Link Checker"
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/workflows/mlc_config.json'
          check-modified-files-only: 'yes' # Faqat o'zgargan fayllarni tekshiradi