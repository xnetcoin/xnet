name: "XNET: Monthly Snapshot"

on:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Archive XNET Core"
        uses: softprops/action-gh-release@v1
        with:
          tag_name: monthly-${{ github.sha }}
          name: "XNET Protocol Archive: $(date +'%Y-%m')"
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}