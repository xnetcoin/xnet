name: "XNET: Monthly Ecosystem Snapshot"

on:
  schedule:
    - cron: "0 1 1 * *" # Har oyning 1-kuni, soat 01:00 da
  workflow_dispatch: # Qo'lda ham ishga tushirish imkoniyati

jobs:
  build:
    name: "Creating Monthly Archive"
    runs-on: ubuntu-latest
    steps:
      - name: Generate Tag Names
        id: tags
        run: |
          echo "new=monthly-$(date +' archaeology-%Y-%m')" >> $GITHUB_OUTPUT
          echo "old=monthly-$(date -d'1 month ago' +' archaeology-%Y-%m')" >> $GITHUB_OUTPUT

      - name: Checkout Master
        uses: actions/checkout@v4
        with:
          ref: 'master'
          fetch-depth: 0

      - name: Create Snapshot Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tags.outputs.new }}
          name: "XNET Protocol Snapshot: ${{ steps.tags.outputs.new }}"
          body: "Automatic monthly snapshot of XNET Core. For technical history only."
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}