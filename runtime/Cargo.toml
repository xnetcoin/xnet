    "pallet-election-provider-multi-phase/std",
    "pallet-babe/std",
    "pallet-balances/std",
    "pallet-grandpa/std",
    "pallet-sudo/std",
    "pallet-timestamp/std",
    "pallet-transaction-payment/std",
    "pallet-utility/std",
    "pallet-authorship/std",
    "pallet-session/std",
    "pallet-staking/std",
    "pallet-offences/std",
    "pallet-im-online/std",
    "pallet-treasury/std",
    "pallet-contracts/std",
    "pallet-block-reward/std",
    "pallet-vesting/std",

