# xnet-runtime
#
# The core WASM runtime for the XNET blockchain. This crate defines every pallet
# configuration, the `construct_runtime!` macro call, and all Runtime API
# implementations. It compiles to a WASM blob that is embedded in the node binary
# and can be upgraded on-chain without restarting nodes.
#
# Feature flags
# -------------
# std              — Native/host build (development, benchmarking, RPC).
# runtime-benchmarks — Activates weight measurement blocks inside pallets.
# try-runtime      — Enables state-migration testing via try-runtime-cli.

[package]
name = "xnet-runtime"
version = "1.0.0"
description = "XNET Protocol Runtime — dual EVM + ink! smart-contract blockchain"
authors = ["XNET Protocol Team"]
homepage = "https://xnetcoin.org"
edition = "2021"
license = "GPL-3.0-or-later"
publish = false
repository = "https://github.com/xnetcoin/xnet"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

# Dependencies

[dependencies]
# Serialization — SCALE codec is the canonical encoding for all on-chain data.
codec      = { workspace = true }
scale-info = { workspace = true }
# serde is optional — only needed when serializing chain state to JSON (std builds).
serde      = { workspace = true, optional = true }

# --- FRAME Core ---
frame-support                  = { workspace = true }
frame-system                   = { workspace = true }
frame-executive                = { workspace = true }
frame-try-runtime              = { workspace = true, optional = true }
frame-benchmarking             = { workspace = true, optional = true }
frame-system-benchmarking      = { workspace = true, optional = true }
frame-election-provider-support = { workspace = true }
frame-system-rpc-runtime-api   = { workspace = true }

# --- Substrate Primitives ---
sp-api              = { workspace = true }
sp-block-builder    = { workspace = true }
sp-consensus-babe   = { workspace = true, features = ["serde"] }
sp-consensus-grandpa = { workspace = true, features = ["serde"] }
sp-core             = { workspace = true }
sp-inherents        = { workspace = true }
sp-offchain         = { workspace = true }
sp-runtime          = { workspace = true }
sp-session          = { workspace = true }
sp-std              = { workspace = true }
sp-transaction-pool = { workspace = true }
sp-version          = { workspace = true }
sp-genesis-builder  = { workspace = true }
sp-staking          = { workspace = true }

# --- Pallets — RPC Runtime APIs ---
pallet-transaction-payment-rpc-runtime-api = { workspace = true }
pallet-election-provider-multi-phase       = { workspace = true }

# --- Substrate Pallets ---
pallet-babe                 = { workspace = true }
pallet-balances             = { workspace = true }
pallet-grandpa              = { workspace = true }
pallet-sudo                 = { workspace = true }
pallet-timestamp            = { workspace = true }
pallet-transaction-payment  = { workspace = true }
pallet-utility              = { workspace = true }
pallet-authorship           = { workspace = true }
pallet-session              = { workspace = true }
pallet-staking              = { workspace = true }
pallet-staking-reward-curve = { workspace = true }
pallet-offences             = { workspace = true }
pallet-im-online            = { workspace = true }
pallet-treasury             = { workspace = true }
# ink! WASM smart contracts — deploy ink! contracts via cargo-contract or Contracts UI.
pallet-contracts            = { workspace = true }
pallet-vesting              = { workspace = true }

# --- Frontier / EVM Stack ---
# Frontier provides Ethereum RPC compatibility and EVM execution on top of Substrate.
fp-rpc          = { workspace = true }
fp-evm          = { workspace = true }
fp-self-contained = { workspace = true, features = ["serde"] }
pallet-evm      = { workspace = true }
pallet-ethereum = { workspace = true }
pallet-base-fee = { workspace = true }

# --- EVM Precompiles (standard Ethereum precompile set 0x01–0x09) ---
precompile-utils                = { workspace = true }
pallet-evm-precompile-simple    = { workspace = true }
pallet-evm-precompile-modexp    = { workspace = true }
pallet-evm-precompile-bn128     = { workspace = true }
pallet-evm-precompile-blake2    = { workspace = true }

# --- Custom Pallets ---
pallet-block-reward = { workspace = true }

# --- Build Dependencies ---

[build-dependencies]
# Compiles this crate to a WASM blob and embeds it via include_bytes! in the node.
substrate-wasm-builder = { workspace = true }

# --- Feature Flags

[features]
default = ["std"]

# std — enables the Rust standard library for native (non-WASM) builds.
# All pallets and primitives must expose a matching /std feature.
std = [
    "codec/std",
    "scale-info/std",
    "serde/std",

    # Frame
    "frame-support/std",
    "frame-system/std",
    "frame-executive/std",
    "frame-try-runtime?/std",
    "frame-benchmarking?/std",
    "frame-system-benchmarking?/std",
